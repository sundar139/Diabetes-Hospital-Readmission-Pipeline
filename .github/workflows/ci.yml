name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  frontend-lightweight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest ruff

      - name: Frontend lint
        run: ruff check streamlit_app.py src/frontend tests/test_streamlit_frontend_lightweight.py

      - name: Streamlit entrypoint import smoke
        run: |
          python -c "import streamlit_app; assert hasattr(streamlit_app, 'main')"

      - name: Frontend lightweight tests
        run: pytest tests/test_streamlit_frontend_lightweight.py

  full-stack:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --group dev --extra eda

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest

      - name: Healthcheck
        run: uv run python scripts/healthcheck.py

      - name: API import smoke
        run: uv run python -c "from src.serving.api import app; print(app.title)"
